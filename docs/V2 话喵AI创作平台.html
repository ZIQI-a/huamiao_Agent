<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>话喵 — 创作工作台</title>
<meta name="description" content="话喵创作工作台：输入主题，选择风格，让 AI 帮你写文章、古诗词、风格仿写。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Design Tokens (consistent with landing page) ===== */
:root {
  --bg: #FFF8EE;
  --bg-warm: #FFE5D9;
  --surface: #FFFFFF;
  --surface-2: #FFF4E8;
  --fg: #2D2A26;
  --muted: #8B7E72;
  --border: #F0DDD0;
  --border-strong: #E5C9B5;
  --accent: #FF8C42;
  --accent-deep: #E76F26;
  --accent-light: #FFEDD8;
  --coral: #FF6B6B;
  --mint: #4ECDC4;
  --mint-light: #E0F8F6;
  --yellow: #FFD93D;
  --yellow-light: #FFF8DD;
  --lavender: #C77DFF;
  --lavender-light: #F5E8FF;
  --shadow-sm: 0 2px 8px rgba(255, 140, 66, 0.08);
  --shadow-md: 0 8px 24px rgba(255, 140, 66, 0.12);
  --shadow-lg: 0 16px 48px rgba(255, 140, 66, 0.16);
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  --sidebar-w: 72px;
  --input-w: 380px;
}

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--fg);
  line-height: 1.6;
  overflow: hidden;
  height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }
svg { display: block; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ===== App Layout ===== */
.app {
  display: grid;
  grid-template-rows: 64px 1fr;
  height: 100vh;
}

/* ===== Top Bar ===== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  z-index: 100;
}

.topbar-left { display: flex; align-items: center; gap: 20px; }

.logo-link {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--fg);
}

.logo-cat {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}
.logo-cat::before, .logo-cat::after {
  content: '';
  position: absolute;
  top: -4px;
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 10px solid var(--accent);
}
.logo-cat::before { left: 5px; transform: rotate(-20deg); }
.logo-cat::after { right: 5px; transform: rotate(20deg); }

.logo-cat .face {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.logo-cat .face::before,
.logo-cat .face::after {
  content: '';
  width: 4px; height: 4px;
  background: white;
  border-radius: 50%;
}

.logo-text {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 22px;
  color: var(--fg);
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--muted);
}
.breadcrumb .sep { color: var(--border-strong); }
.breadcrumb .current { color: var(--fg); font-weight: 500; }

.topbar-right { display: flex; align-items: center; gap: 12px; }

.icon-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: all 0.2s;
}
.icon-btn:hover { background: var(--bg-warm); color: var(--accent); }

.icon-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }

.avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--coral));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.2s;
}
.avatar:hover { transform: scale(1.05); }

/* ===== Mode Tabs ===== */
.mode-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-warm);
  padding: 4px;
  border-radius: 12px;
}
.mode-tab {
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  transition: all 0.2s;
  white-space: nowrap;
}
.mode-tab:hover { color: var(--fg); }
.mode-tab.active {
  background: var(--surface);
  color: var(--accent-deep);
  box-shadow: var(--shadow-sm);
  font-weight: 700;
}

/* ===== Main Body ===== */
.body-area {
  display: grid;
  grid-template-columns: var(--sidebar-w) var(--input-w) 1fr;
  overflow: hidden;
}

/* ===== Sidebar (History) ===== */
.sidebar {
  background: var(--surface);
  border-right: 1.5px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  gap: 8px;
}

.side-nav-btn {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: all 0.2s;
  position: relative;
}
.side-nav-btn:hover { background: var(--bg-warm); color: var(--accent); }
.side-nav-btn.active {
  background: var(--accent-light);
  color: var(--accent-deep);
}
.side-nav-btn.active::before {
  content: '';
  position: absolute;
  left: -16px;
  top: 50%;
  transform: translateY(-50%);
  width: 4px; height: 24px;
  background: var(--accent);
  border-radius: 0 4px 4px 0;
}
.side-nav-btn svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }

.side-nav-btn .badge {
  position: absolute;
  top: 4px; right: 4px;
  width: 8px; height: 8px;
  background: var(--coral);
  border-radius: 50%;
  border: 2px solid var(--surface);
}

.side-divider {
  width: 32px; height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin: 4px 0;
}

.side-logo {
  margin-bottom: 8px;
}

/* Tooltip for sidebar buttons */
.side-nav-btn[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  left: calc(100% + 12px);
  top: 50%;
  transform: translateY(-50%);
  background: var(--fg);
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 13px;
  white-space: nowrap;
  z-index: 200;
  pointer-events: none;
}

/* ===== Input Panel ===== */
.input-panel {
  background: var(--surface);
  border-right: 1.5px solid var(--border);
  overflow-y: auto;
  padding: 24px;
}

.panel-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
}
.panel-header h2 {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 20px;
  color: var(--fg);
}
.panel-header .cat-icon {
  width: 32px; height: 32px;
  background: var(--accent-light);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel-header .cat-icon svg { width: 20px; height: 20px; stroke: var(--accent-deep); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }

/* Form sections */
.form-section { margin-bottom: 22px; }

.form-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--fg);
  margin-bottom: 8px;
}
.form-label .required { color: var(--coral); }

.form-hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

/* Text input */
.text-input {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 15px;
  background: var(--surface-2);
  transition: all 0.2s;
  outline: none;
}
.text-input:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.text-input::placeholder { color: #C9B8A8; }

.text-input.error {
  border-color: var(--coral);
  background: #FFF5F5;
}

.input-error-msg {
  display: none;
  font-size: 12px;
  color: var(--coral);
  margin-top: 6px;
  align-items: center;
  gap: 4px;
}
.input-error-msg.show { display: flex; }

/* Textarea */
.textarea-input {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  background: var(--surface-2);
  transition: all 0.2s;
  outline: none;
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}
.textarea-input:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-light);
}

/* Style preset cards */
.style-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.style-card {
  padding: 12px;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: var(--surface-2);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
}
.style-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-1px);
}
.style-card.selected {
  border-color: var(--accent);
  background: var(--accent-light);
}
.style-card .style-dot {
  width: 28px; height: 28px;
  border-radius: 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.style-card .style-dot svg { width: 16px; height: 16px; stroke: white; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.style-card .style-name { font-size: 13px; font-weight: 600; }
.style-card .style-desc { font-size: 11px; color: var(--muted); }

/* Slider */
.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: var(--bg-warm);
  border-radius: 3px;
  outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid white;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s;
}
.slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
.slider::-moz-range-thumb {
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid white;
  box-shadow: var(--shadow-sm);
}
.slider-value {
  min-width: 64px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent-deep);
  background: var(--accent-light);
  padding: 4px 10px;
  border-radius: 8px;
}

/* Tag selector */
.tag-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag-chip {
  padding: 6px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface-2);
}
.tag-chip:hover { border-color: var(--border-strong); color: var(--fg); }
.tag-chip.selected {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  font-weight: 600;
}

/* Generate button */
.generate-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent), var(--coral));
  color: white;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.2s;
  box-shadow: var(--shadow-md);
  margin-top: 8px;
}
.generate-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.generate-btn:active:not(:disabled) { transform: translateY(0); }
.generate-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.generate-btn svg { width: 20px; height: 20px; stroke: white; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

.generate-btn.loading {
  background: linear-gradient(135deg, var(--accent-deep), var(--coral));
}

/* ===== Preview Panel ===== */
.preview-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.preview-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  min-height: 56px;
}

.preview-toolbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.status-badge.idle { background: var(--bg-warm); color: var(--muted); }
.status-badge.loading { background: var(--yellow-light); color: #B8860B; }
.status-badge.done { background: var(--mint-light); color: #2A9D8F; }
.status-badge.error { background: #FFF0F0; color: var(--coral); }

.status-badge .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.status-badge.loading .dot { animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.toolbar-actions {
  display: flex;
  gap: 8px;
}

.tool-btn {
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  border: 1.5px solid transparent;
}
.tool-btn:hover { background: var(--bg-warm); color: var(--fg); }
.tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.tool-btn:disabled:hover { background: none; color: var(--muted); }

.tool-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }

.tool-btn.primary {
  background: var(--accent-light);
  color: var(--accent-deep);
  border-color: var(--accent-light);
}
.tool-btn.primary:hover { background: var(--accent); color: white; }

/* Preview content area */
.preview-content {
  flex: 1;
  overflow-y: auto;
  padding: 32px 48px;
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  gap: 16px;
  padding: 40px;
}

.empty-cat {
  width: 120px; height: 120px;
  position: relative;
  margin-bottom: 8px;
}

.empty-cat .cat-body {
  width: 100%; height: 100%;
  background: var(--accent-light);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.empty-cat .cat-body::before,
.empty-cat .cat-body::after {
  content: '';
  position: absolute;
  top: 5px;
  width: 0; height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-bottom: 20px solid var(--accent-light);
}
.empty-cat .cat-body::before { left: 15px; transform: rotate(-15deg); }
.empty-cat .cat-body::after { right: 15px; transform: rotate(15deg); }

.empty-cat .cat-face {
  width: 60px; height: 50px;
  position: relative;
  z-index: 2;
}
.empty-cat .cat-eye {
  position: absolute;
  top: 10px;
  width: 8px; height: 12px;
  background: var(--fg);
  border-radius: 50%;
}
.empty-cat .cat-eye.left { left: 10px; }
.empty-cat .cat-eye.right { right: 10px; }
.empty-cat .cat-nose {
  position: absolute;
  top: 26px;
  left: 50%;
  transform: translateX(-50%);
  width: 8px; height: 6px;
  background: var(--coral);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
}
.empty-cat .cat-mouth {
  position: absolute;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  width: 16px; height: 8px;
  border-bottom: 2px solid var(--fg);
  border-radius: 0 0 50% 50%;
}
.empty-cat .cat-whisker {
  position: absolute;
  top: 24px;
  width: 14px; height: 1.5px;
  background: var(--muted);
}
.empty-cat .cat-whisker.left { left: -8px; }
.empty-cat .cat-whisker.right { right: -8px; }

/* Tail */
.empty-cat .cat-tail {
  position: absolute;
  bottom: 10px;
  right: -15px;
  width: 30px; height: 20px;
  border: 4px solid var(--accent-light);
  border-left: none;
  border-top: none;
  border-radius: 0 0 50% 0;
  transform-origin: left center;
  animation: tailWag 2s ease-in-out infinite;
}

@keyframes tailWag {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(20deg); }
}

.empty-state h3 {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 22px;
  color: var(--fg);
}
.empty-state p {
  font-size: 15px;
  color: var(--muted);
  max-width: 360px;
  line-height: 1.7;
}

.empty-tips {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}
.empty-tip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}
.empty-tip:hover {
  border-color: var(--accent);
  color: var(--accent-deep);
  transform: translateY(-1px);
}
.empty-tip svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

/* Loading state */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 24px;
}

.loading-cat {
  width: 100px; height: 100px;
  position: relative;
}

.typing-cat {
  width: 80px; height: 60px;
  margin: 20px auto 0;
  position: relative;
}

.typing-cat .tc-head {
  width: 60px; height: 50px;
  background: var(--accent);
  border-radius: 50% 50% 45% 45%;
  margin: 0 auto;
  position: relative;
}
.typing-cat .tc-head::before,
.typing-cat .tc-head::after {
  content: '';
  position: absolute;
  top: -8px;
  width: 0; height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-bottom: 16px solid var(--accent);
}
.typing-cat .tc-head::before { left: 4px; transform: rotate(-18deg); }
.typing-cat .tc-head::after { right: 4px; transform: rotate(18deg); }

.typing-cat .tc-eye {
  position: absolute;
  top: 18px;
  width: 6px; height: 8px;
  background: white;
  border-radius: 50%;
}
.typing-cat .tc-eye.left { left: 16px; }
.typing-cat .tc-eye.right { right: 16px; }

.typing-cat .tc-nose {
  position: absolute;
  top: 30px; left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 4px;
  background: var(--coral);
  border-radius: 50%;
}

.typing-cat .tc-paw {
  position: absolute;
  bottom: 0;
  width: 16px; height: 12px;
  background: var(--accent);
  border-radius: 8px 8px 4px 4px;
}
.typing-cat .tc-paw.left { left: 10px; animation: typeLeft 0.4s infinite; }
.typing-cat .tc-paw.right { right: 10px; animation: typeRight 0.4s infinite; }

@keyframes typeLeft {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes typeRight {
  0%, 100% { transform: translateY(-6px); }
  50% { transform: translateY(0); }
}

.loading-dots {
  display: flex;
  gap: 6px;
}
.loading-dots span {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 0.5s infinite alternate;
}
.loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.loading-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce {
  from { transform: translateY(0); opacity: 0.4; }
  to { transform: translateY(-8px); opacity: 1; }
}

.loading-text {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 18px;
  color: var(--fg);
}
.loading-subtext {
  font-size: 14px;
  color: var(--muted);
}

/* Article result */
.article-result {
  max-width: 720px;
  margin: 0 auto;
}

.article-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--muted);
}
.article-meta .meta-tag {
  padding: 3px 10px;
  background: var(--accent-light);
  color: var(--accent-deep);
  border-radius: 6px;
  font-weight: 600;
  font-size: 12px;
}
.article-meta .meta-dot { color: var(--border-strong); }

.article-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px;
  font-weight: 700;
  line-height: 1.4;
  color: var(--fg);
  margin-bottom: 8px;
}

.article-subtitle {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 24px;
  line-height: 1.6;
}

.article-body {
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  line-height: 2;
  color: var(--fg);
}

.article-body p {
  margin-bottom: 18px;
  text-indent: 2em;
}

.article-body h3 {
  font-size: 18px;
  font-weight: 700;
  margin-top: 28px;
  margin-bottom: 14px;
  color: var(--fg);
}

.article-body blockquote {
  margin: 20px 0;
  padding: 12px 20px;
  background: var(--surface);
  border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0;
  color: var(--muted);
  font-style: italic;
  text-indent: 0;
}

/* Poetry result */
.poetry-result {
  text-align: center;
  padding: 40px 20px;
}
.poetry-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 8px;
}
.poetry-author {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 32px;
}
.poetry-body {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px;
  line-height: 2.4;
  letter-spacing: 0.1em;
  color: var(--fg);
}
.poetry-body .line { display: block; }
.poetry-comment {
  margin-top: 32px;
  padding: 16px 20px;
  background: var(--surface);
  border-radius: 12px;
  font-size: 14px;
  color: var(--muted);
  text-align: left;
  line-height: 1.8;
}

/* Style imitation result */
.imitation-result {
  max-width: 720px;
  margin: 0 auto;
}
.imitation-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: var(--lavender-light);
  color: #8B5CF6;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 16px;
}
.imitation-body {
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  line-height: 2;
}
.imitation-body p { margin-bottom: 18px; text-indent: 2em; }

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--fg);
  color: white;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow-lg);
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast svg { width: 18px; height: 18px; stroke: var(--mint); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

/* ===== History Panel (slide-out) ===== */
.history-overlay {
  position: fixed;
  inset: 0;
  background: rgba(45, 42, 38, 0.3);
  z-index: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.history-overlay.show { opacity: 1; pointer-events: auto; }

.history-panel {
  position: fixed;
  left: var(--sidebar-w);
  top: 64px;
  bottom: 0;
  width: 340px;
  background: var(--surface);
  box-shadow: var(--shadow-lg);
  z-index: 501;
  transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
  display: flex;
  flex-direction: column;
}
.history-panel.show { transform: translateX(0); }

.history-header {
  padding: 20px 24px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.history-header h3 {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 18px;
}
.history-close {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: all 0.2s;
}
.history-close:hover { background: var(--bg-warm); }
.history-close svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.history-item {
  padding: 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 6px;
  border: 1.5px solid transparent;
}
.history-item:hover {
  background: var(--bg-warm);
}
.history-item.active {
  background: var(--accent-light);
  border-color: var(--accent);
}

.history-item-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.history-item-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.history-item-meta .type-tag {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.history-item-meta .type-tag.article { background: var(--accent-light); color: var(--accent-deep); }
.history-item-meta .type-tag.poetry { background: var(--mint-light); color: #2A9D8F; }
.history-item-meta .type-tag.imitation { background: var(--lavender-light); color: #8B5CF6; }

/* ===== Responsive ===== */
@media (max-width: 1024px) {
  :root { --input-w: 320px; }
  .preview-content { padding: 24px 28px; }
}

@media (max-width: 768px) {
  .body-area {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }
  .sidebar { display: none; }
  .input-panel {
    border-right: none;
    border-bottom: 1.5px solid var(--border);
    max-height: 40vh;
  }
  .mode-tabs { display: none; }
  .breadcrumb { display: none; }
  .preview-content { padding: 20px 16px; }
  .article-title { font-size: 22px; }
  .article-body { font-size: 15px; }
}

/* ===== Reduced motion ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ===== Focus visible ===== */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
button:focus-visible, .style-card:focus-visible, .tag-chip:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
</style>

  // ===== DOM refs =====
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const modeTabs = $$('.mode-tab');
  const formArticle = $('#form-article');
  const formPoetry = $('#form-poetry');
  const formImitation = $('#form-imitation');

  const wordCountEl = $('#wordCount');

  const regenBtn = $('#regenBtn');
  const saveBtn = $('#saveBtn');

  const toastText = $('#toastText');
  const historyBtn = $('#historyBtn');
  const historyPanel = $('#historyPanel');
  const historyOverlay = $('#historyOverlay');
  const historyClose = $('#historyClose');
  const historyList = $('#historyList');

  // ===== Mode switching =====
  modeTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const mode = tab.dataset.mode;
      switchMode(mode);
    });
  });

  function switchMode(mode) {
    state.mode = mode;
    modeTabs.forEach(t => {
      t.classList.toggle('active', t.dataset.mode === mode);
      t.setAttribute('aria-selected', t.dataset.mode === mode);
    });
    formArticle.style.display = mode === 'article' ? '' : 'none';
    formPoetry.style.display = mode === 'poetry' ? '' : 'none';
    formImitation.style.display = mode === 'imitation' ? '' : 'none';

    const titles = { article: '文章创作', poetry: '古诗词', imitation: '风格仿写' };
    panelTitle.textContent = titles[mode];
    breadcrumbMode.textContent = titles[mode];

    // Reset to empty state if no result
    if (!state.hasResult) {
      showEmptyState();
    }
  }

  // ===== Style card selection =====
  $$('.style-card').forEach(card => {
    card.addEventListener('click', () => {
      const siblings = card.parentElement.querySelectorAll('.style-card');
      siblings.forEach(s => s.classList.remove('selected'));
      card.classList.add('selected');
    });
  });

  // ===== Tag chip selection (multi-select for tone, single for season/mood) =====
  $$('.tag-group').forEach(group => {
    const isMulti = group.id === 'toneTags';
    group.querySelectorAll('.tag-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        if (isMulti) {
          chip.classList.toggle('selected');
        } else {
          group.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
        }
      });
    });
  });

  // ===== Slider value update =====
  const lengthSlider = $('#lengthSlider');
  const lengthValue = $('#lengthValue');
  lengthSlider.addEventListener('input', () => {
    lengthValue.textContent = lengthSlider.value + '字';
  });

  const imitationLength = $('#imitationLength');
  const imitationLengthValue = $('#imitationLengthValue');
  imitationLength.addEventListener('input', () => {
    imitationLengthValue.textContent = imitationLength.value + '字';
  });

  // ===== Empty state tips =====
  $$('.empty-tip').forEach(tip => {
    tip.addEventListener('click', () => {
      const example = tip.dataset.example;
      // Route to appropriate mode and fill input
      if (example === '秋日思乡') {
        switchMode('poetry');
        $('#poetryTheme').value = example;
      } else {
        switchMode('article');
        $('#topicInput').value = example;
      }
    });
  });

  // ===== Generate handlers =====
  $('#generateBtn').addEventListener('click', () => generate('article'));
  $('#generateBtnPoetry').addEventListener('click', () => generate('poetry'));
  $('#generateBtnImitation').addEventListener('click', () => generate('imitation'));

  function generate(mode) {
    if (state.isGenerating) return;

    // Validate input
    let topicInput, topicValue, errorEl;
    if (mode === 'article') {
      topicInput = $('#topicInput');
      errorEl = $('#topicError');
      topicValue = topicInput.value.trim();
      if (!topicValue) {
        topicInput.classList.add('error');
        errorEl.classList.add('show');
        topicInput.focus();
        return;
      }
    } else if (mode === 'poetry') {
      topicInput = $('#poetryTheme');
      errorEl = $('#poetryError');
      topicValue = topicInput.value.trim();
      if (!topicValue) {
        topicInput.classList.add('error');
        errorEl.classList.add('show');
        topicInput.focus();
        return;
      }
    } else if (mode === 'imitation') {
      topicInput = $('#imitationTopic');
      errorEl = $('#imitationError');
      topicValue = topicInput.value.trim();
      if (!topicValue) {
        topicInput.classList.add('error');
        errorEl.classList.add('show');
        topicInput.focus();
        return;
      }
    }

    // Clear error
    topicInput.classList.remove('error');
    errorEl.classList.remove('show');

    // Get selected style
    const styleContainer = mode === 'article' ? '#articleStyles' : mode === 'poetry' ? '#poetryStyles' : '#imitationStyles';
    const selectedStyle = $(styleContainer).querySelector('.style-card.selected');
    const styleKey = selectedStyle ? selectedStyle.dataset.style : Object.keys(TEMPLATES[mode])[0];

    // Start generating
    state.isGenerating = true;
    updateStatus('loading', '话喵创作中');
    setGeneratingState(true);

    // Show loading state
    showLoadingState(mode);

    // Simulate generation (2s)
    setTimeout(() => {
      const result = getTemplate(mode, styleKey, topicValue);
      showResult(mode, result, topicValue, styleKey);
      state.isGenerating = false;
      state.hasResult = true;
      state.currentResult = { mode, result, topic: topicValue, style: styleKey, timestamp: Date.now() };
      updateStatus('done', '创作完成');
      setGeneratingState(false);
      enableToolbar();
    }, 2000);
  }

  function getTemplate(mode, styleKey, topic) {
    const template = TEMPLATES[mode][styleKey] || TEMPLATES[mode][Object.keys(TEMPLATES[mode])[0]];
    // Deep copy and update title with user's topic
    if (mode === 'article') {
      return {
        title: topic,
        subtitle: template.subtitle,
        body: template.body
      };
    } else if (mode === 'poetry') {
      return {
        title: topic,
        author: template.author,
        lines: template.lines,
        comment: template.comment
      };
    } else {
      return {
        title: topic,
        body: template.body
      };
    }
  }

            <span>话喵 AI 生成</span>
          </div>
          <h2 class="poetry-title">${escapeHtml(result.title)}</h2>
          <p class="poetry-author">${escapeHtml(result.author)}</p>
          <div class="poetry-body">
            ${result.lines.map(l => l ? `<span class="line">${escapeHtml(l)}</span>` : '<br>').join('')}
          </div>
          <div class="poetry-comment">
            <strong>话喵赏析：</strong>${escapeHtml(result.comment)}
          </div>
        </div>
      `;
    } else if (mode === 'imitation') {
      const styleNames = {
        luxun: '鲁迅风', ailing: '张爱玲风', yuhua: '余华风',
        xiaobo: '王小波风', jin: '金庸风', moyan: '莫言风'
      };
      wordCount = result.body.replace(/<[^>]+>/g, '').length;
      html = `
        <div class="imitation-result">
          <div class="article-meta">
            <span class="meta-tag" style="background:var(--lavender-light);color:#8B5CF6;">${styleNames[styleKey] || '风格仿写'}</span>
            <span class="meta-dot">·</span>
            <span>话喵 AI 生成</span>
            <span class="meta-dot">·</span>
            <span>${new Date().toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span>
          </div>
          <h1 class="article-title">${escapeHtml(result.title)}</h1>
          <div class="imitation-body">${result.body}</div>
        </div>
      `;
    }

    previewContent.innerHTML = html;
    wordCountEl.textContent = wordCount > 0 ? `约 ${wordCount} 字` : '';
  }

  function updateStatus(type, text) {
    statusBadge.className = 'status-badge ' + type;
    statusText.textContent = text;
  }

  function setGeneratingState(loading) {
    const btns = $$('.generate-btn');
    btns.forEach(btn => {
      btn.disabled = loading;
      if (loading) {
        btn.classList.add('loading');
        const span = btn.querySelector('span');
        if (span) span.textContent = '创作中…';
      } else {
        btn.classList.remove('loading');
        // Restore original text
        const mode = state.mode;
        const texts = { article: '开始创作', poetry: '开始赋诗', imitation: '开始仿写' };
        const span = btn.querySelector('span');
        if (span) span.textContent = texts[mode] || '开始创作';
      }
    });
  }

  function enableToolbar() {
    copyBtn.disabled = false;
    regenBtn.disabled = false;
    saveBtn.disabled = false;
  }

  // ===== Copy =====
  copyBtn.addEventListener('click', () => {
    if (!state.currentResult) return;
    const { mode, result } = state.currentResult;
    let text = '';
    if (mode === 'article' || mode === 'imitation') {
      text = result.title + '\n\n' + result.body.replace(/<[^>]+>/g, '').replace(/\n{3,}/g, '\n\n');
    } else if (mode === 'poetry') {
      text = result.title + '\n' + result.author + '\n\n' + result.lines.filter(l => l).join('\n') + '\n\n' + result.comment;
    }
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制到剪贴板');
    }).catch(() => {
      showToast('复制失败，请手动选择');
    });
  });

  // ===== Regenerate =====
  regenBtn.addEventListener('click', () => {
    if (!state.currentResult) return;
    generate(state.currentResult.mode);
  });

  // ===== Save =====
  saveBtn.addEventListener('click', () => {
    if (!state.currentResult) return;
    const { mode, result, topic, style, timestamp } = state.currentResult;
    const typeNames = { article: '文章', poetry: '诗词', imitation: '仿写' };
    state.history.unshift({ mode, title: topic, typeLabel: typeNames[mode], timestamp });
    renderHistory();
    showToast('已保存到历史记录');
    historyBtn.querySelector('.badge').style.display = 'block';
  });

  // ===== History =====
  historyBtn.addEventListener('click', () => {
    historyPanel.classList.add('show');
    historyOverlay.classList.add('show');
  });

  historyClose.addEventListener('click', closeHistory);
  historyOverlay.addEventListener('click', closeHistory);

  function closeHistory() {
    historyPanel.classList.remove('show');
    historyOverlay.classList.remove('show');
  }

  function renderHistory() {
    if (state.history.length === 0) {
      historyList.innerHTML = `
        <div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;">
          <div style="font-size:16px;margin-bottom:8px;">还没有创作记录</div>
          <div>写第一篇作品，话喵帮你记下来</div>
        </div>
      `;
      return;
    }
    const typeClasses = { article: 'article', poetry: 'poetry', imitation: 'imitation' };
    historyList.innerHTML = state.history.map((item, idx) => `
      <div class="history-item ${idx === 0 ? 'active' : ''}" data-idx="${idx}">
        <div class="history-item-title">${escapeHtml(item.title)}</div>
        <div class="history-item-meta">
          <span class="type-tag ${typeClasses[item.mode]}">${item.typeLabel}</span>
          <span>·</span>
          <span>${formatTime(item.timestamp)}</span>
        </div>
      </div>
    `).join('');

    $$('.history-item').forEach(el => {
      el.addEventListener('click', () => {
        $$('.history-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        const idx = parseInt(el.dataset.idx);
        const item = state.history[idx];
        // Restore the result
        switchMode(item.mode);
        // Fill the input
        if (item.mode === 'article') $('#topicInput').value = item.title;
        else if (item.mode === 'poetry') $('#poetryTheme').value = item.title;
        else $('#imitationTopic').value = item.title;
        closeHistory();
      });
    });
  }

  // ===== Toast =====
  function showToast(msg) {
    toastText.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ===== Helpers =====
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatTime(ts) {
    const diff = Date.now() - ts;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
    return new Date(ts).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
  }

  // ===== Input error clearing on type =====
  ['topicInput', 'poetryTheme', 'imitationTopic'].forEach(id => {
    const el = $('#' + id);
    if (el) {
      el.addEventListener('input', () => {
        el.classList.remove('error');
        const errId = id.replace('Input', '').replace('Theme', 'Error').replace('Topic', 'Error');
      });
    }
  });

  // Clear error on input for all
  $('#topicInput')?.addEventListener('input', () => {
    $('#topicInput').classList.remove('error');
    $('#topicError').classList.remove('show');
  });
  $('#poetryTheme')?.addEventListener('input', () => {
    $('#poetryTheme').classList.remove('error');
    $('#poetryError').classList.remove('show');
  });
  $('#imitationTopic')?.addEventListener('input', () => {
    $('#imitationTopic').classList.remove('error');
    $('#imitationError').classList.remove('show');
  });

  // Hide history badge initially
  historyBtn.querySelector('.badge').style.display = 'none';

})();
</script>
